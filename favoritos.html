<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>favoritos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f0f0f0e6;
        }

        /*CABEÇA DO SITE*/
        header {
            background: rgba(49, 25, 39, 0.8);
            backdrop-filter: blur(10px);
        }


        header {
            background: linear-gradient(135deg, #311927, #72224e, #F2C57C);
            color: white;
            padding: 7px 0;
            box-shadow: 0 4px 15px rgba(75, 25, 50, 0.3);
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            margin: auto;
        }

        .logo img {
            width: 1200px;
            height: auto;
        }

        .menu {
            display: flex;
            list-style: none;
            gap: 30px;
        }


        .menu a {
            color: #3d0d2af5;
            text-decoration: none;
            font-weight: 5000;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
        }

        .menu a::after {
            content: "";
            position: absolute;
            width: 0%;
            height: 2px;
            bottom: 0;
            left: 0;
            background: #551c39;
            transition: 0.3s;
        }

        .menu a:hover {
            color: #D16A7E;
        }

        .menu a:hover::after {
            width: 100%;
        }

        .menu i {
            font-size: 30px;
        }


        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .titulo-favorito {
            font-family: Poppins;
            text-align: center;
            color: #311927;
            position: relative;
            font-size: 35px;
            letter-spacing: 1px;
            text-shadow: 1px 1px 5px rgba(179, 12, 112, 0.1);
        }

        .titulo-favorito::after {
            content: "";
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, #311927, #72224e);
            display: block;
            margin: 10px auto 0;
            border-radius: 10px;
        }

        #lista-favoritos {
            margin-top: 20px;
        }

        p {
            color: #311927;
            font-family: Poppins;
            padding: 5px 0;
        }

        h3 {
            font-size: 30px;
        }

        .card-noticia img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 20%;
            padding: 5px;
            margin: 5px;

        }

        .card-noticia {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 320px;
            margin-top: 50px;
        }


        .card-conteudo {
            padding: 10px;
        }

        .card-noticia:hover {
            transform: translateY(-20px);
            background: #311927f5;
            color: white;
        }

        .card-noticia:hover .btn-leia {
            background: white;
            color: #311927f5;
        }

        .card img:hover {
            transform: scale(1.05);
        }

        .card-noticia:hover h3,
        .card-noticia:hover h4,
        .card-noticia:hover p {
            color: white;
        }

        .card-conteudo h3 {
            margin-bottom: 5px;
            font-family: Poppins;
            color: #612a4a;
        }

        .card-conteudo h4 {
            font-family: Poppins;
            font-size: 20px;
            margin-bottom: 10px;
            color: #311927f5;
        }

        .btn-leia {
            display: inline-block;
            padding: 8px;
            background: rgb(62, 20, 40);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 5px;
            font-family: Poppins;
            width: 100%;
        }
    </style>
</head>

<body>
    <header>
        <div class="header-container">
            <img src="imagens/png.png" alt="Aroma Flow">

            <nav>

                <ul class="menu">
                    <li>
                        <a href="./loja.html">
                            <i class="fas fa-home"></i>
                        </a>
                    </li>

                    <li>
                        <a href="./favoritos.html">
                            <i class="fas fa-heart"></i>
                        </a>
                    </li>

                    <li>
                        <a href="./login.php"> <!--link do php aqui-->
                            <i class="fas fa-user"></i>
                        </a>
                    </li>

                    <li>
                        <a href="./carrinho.php">
                            <i class="fas fa-shopping-cart"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <h2 class="titulo-favorito">

        <i class="fas fa-heart"></i>Meus favoritos
    </h2>

    <div id="lista-favoritos"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            const favoritos = JSON.parse(localStorage.getItem('favoritos')) || [];
            const container = document.getElementById('lista-favoritos');

            if (favoritos.length === 0) {
                container.innerHTML = "<p style='text-align:center;'>Nenhum favorito ainda</p>";
            } else {
                favoritos.forEach(produto => {
                    container.innerHTML += `
                <div class="card-noticia">

                    <img src="${produto.img}" />

                    <div class="card-conteudo">
                        <h3>${produto.nome}</h3>

                        <h4>Preço:</h4>
                        <p><strong>${produto.preco}</p>

                        

                        <form action="add_carrinho.php" method="POST">
                            <input type="hidden" name="id_produto" value="${produto.id}">
                            <button type="submit" class="btn-leia">Adicionar</button>
                        </form>
                    </div>

                </div>
            `;
                });
            }

        });
    </script>

</body>

</html>
